  loadEmailsBtn.addEventListener("click", () => {
    const input = emailsInput.value.trim();
    if (!input) {
      alert("Please paste some emails first!");
      return;
    }
    emails = input.split(/\r?\n/).filter(email => email);
    currentIndex = 0;
    if (emails.length > 0) {
      sendNextBtn.disabled = false;
      alert(`${emails.length} emails loaded!`);
    }
  });

  sendNextBtn.addEventListener("click", () => {
    if (currentIndex >= emails.length) {
      alert("All emails sent!");
      sendNextBtn.disabled = true;
      return;
    }

    // Pick a random variant
    const variant = variants[Math.floor(Math.random() * variants.length)];

    const email = emails[currentIndex];
    const mailtoLink = `mailto:${email}?subject=${encodeURIComponent(variant.subject)}&body=${encodeURIComponent(variant.body)}`;

    // Set email link and click
    emailLink.href = mailtoLink;
    emailLink.style.display = "inline-block";
    emailLink.click();

    currentIndex++;

    // Disable button for 15 seconds (cooldown)
    sendNextBtn.disabled = true;
    let countdown = 15;
    sendNextBtn.textContent = `Wait ${countdown}s`;
    const interval = setInterval(() => {
      countdown--;
      sendNextBtn.textContent = `Wait ${countdown}s`;
      if (countdown <= 0) {
        clearInterval(interval);
        sendNextBtn.textContent = "Send Next Email";
        if (currentIndex < emails.length) {
          sendNextBtn.disabled = false;
        }
      }
    }, 1000);
