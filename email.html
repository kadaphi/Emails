// ✅ SAVE
function saveEmails() {
  localStorage.setItem("emails", JSON.stringify(emails));
}

// ✅ LOAD
function loadEmails() {
  const stored = localStorage.getItem("emails");
  if (stored) {
    emails = JSON.parse(stored);
    emailsInput.value = emails.join("\n");
  }
  updateButton();
}

// ✅ BUTTON STATE
function updateButton() {
  sendBtn.disabled = emails.length === 0;
}

// LOAD BUTTON
loadBtn.addEventListener("click", () => {
  const input = emailsInput.value.trim();

  if (!input) {
    alert("Paste emails first");
    return;
  }

  emails = input.split(/\n/).map(e => e.trim()).filter(e => e);

  saveEmails();
  updateButton();

  alert(`${emails.length} emails loaded`);
});

// SEND NEXT
sendBtn.addEventListener("click", () => {

  if (emails.length === 0) {
    alert("All emails sent");
    return;
  }

  // REMOVE FIRST EMAIL ✅
  const email = emails.shift();

  emailsInput.value = emails.join("\n");
  saveEmails();
  updateButton();

  // RANDOM MESSAGE
  const v = variants[Math.floor(Math.random() * variants.length)];

  const link = `mailto:${email}?subject=${encodeURIComponent(v.subject)}&body=${encodeURIComponent(v.body)}`;

  emailLink.href = link;
  emailLink.click();

  cooldown(15);
});

// COOLDOWN
function cooldown(sec) {
  sendBtn.disabled = true;
  let time = sec;

  const interval = setInterval(() => {
    time--;
    sendBtn.textContent = `Wait ${time}s`;

    if (time <= 0) {
      clearInterval(interval);
      sendBtn.textContent = "Send Next Email";
      updateButton();
    }
  }, 1000);
}

// LOAD ON START
window.onload = loadEmails;
